# Database Configuration Properties
# This file contains database configuration for different environments

# Default database type (h2, postgresql, mysql)
database.type=h2

# H2 Database Configuration (for local development)
h2.url=jdbc:h2:./database/blueprinthell;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;AUTO_SERVER_PORT=9090
h2.username=sa
h2.password=
h2.driver=org.h2.Driver
h2.dialect=org.hibernate.dialect.H2Dialect

# PostgreSQL Database Configuration (for production server)
postgresql.url=jdbc:postgresql://localhost:5432/blueprinthell
postgresql.username=blueprinthell_user
postgresql.password=blueprinthell_password
postgresql.driver=org.postgresql.Driver
postgresql.dialect=org.hibernate.dialect.PostgreSQLDialect

# MySQL Database Configuration (alternative production option)
mysql.url=jdbc:mysql://localhost:3306/blueprinthell?useSSL=false&serverTimezone=UTC
mysql.username=blueprinthell_user
mysql.password=blueprinthell_password
mysql.driver=com.mysql.cj.jdbc.Driver
mysql.dialect=org.hibernate.dialect.MySQL8Dialect

# Connection Pool Settings
connection.pool.minimumIdle=5
connection.pool.maximumPoolSize=20
connection.pool.idleTimeout=30000
connection.pool.maxLifetime=2000000
connection.pool.connectionTimeout=30000

# Hibernate Settings
hibernate.show_sql=false
hibernate.format_sql=true
hibernate.hbm2ddl.auto=update
hibernate.cache.use_second_level_cache=true
hibernate.cache.use_query_cache=true
hibernate.jdbc.batch_size=20
hibernate.order_inserts=true
hibernate.order_updates=true
hibernate.jdbc.batch_versioned_data=true

# Offline Sync Settings
offline.sync.interval.seconds=30
offline.sync.cleanup.interval.minutes=5
offline.sync.max.retry.attempts=3
offline.sync.retry.delay.seconds=60
